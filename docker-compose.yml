services:
  mongo:
    image: mongo
    container_name: main-service-mongo
    profiles: ["api"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-dataset:
    image: mongo
    container_name: dataset-mongo
    profiles: ["dataset"]
    ports:
      - "27018:27017"

  ml-weather:
    build: ./services/ML_service
    container_name: ml-weather-service
    profiles: ["api"]
    ports:
      - "8000:8000"
    env_file:
      - ./services/ML_service/.env
    volumes:
      - ./services/ML_service/artifacts:/app/artifacts:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  weather-service:
    build: ./services/weather_service
    container_name: weather-service
    profiles: ["api"]
    ports:
      - "8080:8080"
    env_file:
      - ./services/weather_service/.env
    depends_on:
      - ml-weather
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080

  algorithm:
    build: ./services/algorithm_service
    container_name: algorithm-service
    profiles: ["api"]
    ports:
      - "8001:8000"
    env_file:
      - ./services/algorithm_service/.env.api
    depends_on:
      - weather-service
    command: sh -c 'uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-1}'

  algorithm-dataset:
    build: ./services/algorithm_service
    container_name: algorithm-dataset
    profiles: ["dataset"]
    env_file:
      - ./services/algorithm_service/.env.dataset
    volumes:
      - ./data/era5:/data/era5
      - ./data:/data
    command: python -m modules.atmosphere.generate_dataset_fast

  main:
    build: ./services/main-service
    container_name: main-service
    ports:
      - "3000:3000"
    profiles: ["api"]
    env_file:
      - ./services/main-service/.env
    depends_on:
      - mongo
      - algorithm

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "4200:4200"
    profiles: ["api"]
    depends_on:
      - main

volumes:
  mongo_data:
