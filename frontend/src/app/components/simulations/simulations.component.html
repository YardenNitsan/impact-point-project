<div class="simulation-wrapper">
    <div class="title">Simulations</div>
    <button class="toggle-button" (click)="handleClick()"><p>{{formHistoryClicked? 'View history' : 'Add a simulation'}}</p></button>

    @if(formHistoryClicked){
        <app-form></app-form>           
    }
    @else {
        <div style="color: white;">
            Total of simulations is: {{ total }}
        </div>

        <app-history (countSim)="onCountChanged($event)"></app-history>
    }
    
</div>
